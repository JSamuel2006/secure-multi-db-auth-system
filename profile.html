<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dashboard and Profile Management for NURA AI Labs.">
    <title>Profile Dashboard - NURA AI Labs</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
    <style>
        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="spinner-border text-info mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4 class="text-white">Authenticating Session...</h4>
    </div>

    <!-- Responsive Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-shield-lock-fill me-2"></i>NURA AI LABS
            </a>
            <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-2">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link active" href="profile.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-glass-outline w-100" id="logoutNavbarBtn"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Dashboard Container -->
    <main class="container my-5">
        <div class="row g-4">
            
            <!-- Profile Display Sidebar -->
            <div class="col-lg-4 col-md-5">
                <div class="glass-card text-center h-100">
                    <div class="profile-avatar-container">
                        <img src="assets/images/default-avatar.png" alt="Profile Picture" class="profile-avatar-img" id="displayAvatar">
                    </div>
                    
                    <h3 class="fw-bold mb-1" id="displayName">Loading...</h3>
                    <p class="text-info mb-3">@<span id="displayUsername">...</span></p>
                    
                    <hr class="border-secondary my-4" style="opacity: 0.15;">
                    
                    <div class="text-start mb-4">
                        <div class="mb-3">
                            <small class="text-secondary d-block"><i class="bi bi-envelope-fill me-2"></i>Email Address</small>
                            <span class="fs-6 fw-semibold" id="displayEmail">...</span>
                        </div>
                        <div class="mb-3">
                            <small class="text-secondary d-block"><i class="bi bi-calendar-check-fill me-2"></i>Age</small>
                            <span class="fs-6 fw-semibold" id="displayAge">...</span>
                        </div>
                        <div class="mb-3">
                            <small class="text-secondary d-block"><i class="bi bi-body-text me-2"></i>Bio</small>
                            <p class="mb-0 fs-6 text-light" id="displayBio">...</p>
                        </div>
                    </div>

                    <div class="text-start">
                        <small class="text-secondary d-block mb-2"><i class="bi bi-tags-fill me-2"></i>Interests</small>
                        <div id="displayInterests">
                            <span class="text-secondary italic">None specified yet.</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Profile Settings Panel -->
            <div class="col-lg-8 col-md-7">
                <div class="glass-card h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0">Profile Configuration</h4>
                        <button class="btn btn-danger btn-sm px-3" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i>Sign Out</button>
                    </div>
                    
                    <form id="profileForm" novalidate>
                        <div class="row">
                            <!-- Full Name -->
                            <div class="col-md-8 mb-3">
                                <div class="form-floating">
                                    <input type="text" class="form-control glass-input" id="name" name="name" placeholder="John Doe">
                                    <label for="name"><i class="bi bi-person me-2"></i>Full Name</label>
                                </div>
                            </div>
                            
                            <!-- Age -->
                            <div class="col-md-4 mb-3">
                                <div class="form-floating">
                                    <input type="number" class="form-control glass-input" id="age" name="age" min="0" max="150" placeholder="25">
                                    <label for="age"><i class="bi bi-calendar me-2"></i>Age</label>
                                    <div class="invalid-feedback text-danger mt-1 fs-6"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Bio -->
                        <div class="mb-3">
                            <div class="form-floating">
                                <textarea class="form-control glass-input" id="bio" name="bio" placeholder="Tell us about yourself..." style="height: 120px;"></textarea>
                                <label for="bio"><i class="bi bi-file-earmark-person me-2"></i>Short Bio</label>
                            </div>
                        </div>

                        <!-- Interests (Comma separated) -->
                        <div class="mb-4">
                            <div class="form-floating">
                                <input type="text" class="form-control glass-input" id="interests" name="interests" placeholder="Coding, Music, Design">
                                <label for="interests"><i class="bi bi-tags me-2"></i>Interests (separated by commas)</label>
                                <div class="form-text text-secondary mt-1">Example: Artificial Intelligence, Web Dev, Cyber Security</div>
                            </div>
                        </div>

                        <!-- Save Button -->
                        <button type="submit" class="btn btn-glow px-5 py-3" id="submitBtn">
                            <span id="btnText"><i class="bi bi-save-fill me-2"></i>Save Changes</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="statusToast" class="toast glass-toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="toast-header">
                <i class="bi bi-info-circle-fill me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <small class="text-secondary">Just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
