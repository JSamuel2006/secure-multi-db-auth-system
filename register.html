<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register an account on NURA AI Labs secure authentication system.">
    <title>Register - NURA AI Labs</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Responsive Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-shield-lock-fill me-2"></i>NURA AI LABS
            </a>
            <button class="navbar-toggler border-0 text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-2">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item me-3">
                        <a class="nav-link" href="profile.html">Dashboard</a>
                    </li>
                    <li class="nav-item me-2 my-2 my-lg-0">
                        <a class="btn btn-glass-outline w-100" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-glow w-100 active" href="register.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Register Form Container -->
    <main class="container my-5 py-3">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="glass-card">
                    <h3 class="fw-bold text-center mb-2">Create Account</h3>
                    <p class="text-secondary text-center mb-4">Start your session by registering today</p>
                    
                    <form id="registerForm" novalidate>
                        <!-- Username -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control glass-input" id="username" name="username" placeholder="johndoe" required>
                            <label for="username"><i class="bi bi-person me-2"></i>Username</label>
                            <div class="invalid-feedback text-danger mt-1 fs-6"></div>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control glass-input" id="email" name="email" placeholder="name@example.com" required>
                            <label for="email"><i class="bi bi-envelope me-2"></i>Email address</label>
                            <div class="invalid-feedback text-danger mt-1 fs-6"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <div class="form-floating position-relative">
                                <input type="password" class="form-control glass-input pe-5" id="password" name="password" placeholder="Password" required>
                                <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
                                <button type="button" class="btn-toggle-pass" id="togglePassword" aria-label="Toggle password visibility">
                                    <i class="bi bi-eye" id="togglePasswordIcon"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback text-danger mt-1 fs-6" id="passwordError"></div>
                            <!-- Strength bar -->
                            <div class="mt-2" id="strengthBarWrap">
                                <div class="strength-track">
                                    <div class="strength-fill" id="strengthFill"></div>
                                </div>
                                <small class="strength-label" id="strengthLabel"></small>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <div class="form-floating position-relative">
                                <input type="password" class="form-control glass-input pe-5" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
                                <label for="confirm_password"><i class="bi bi-shield-check me-2"></i>Confirm Password</label>
                                <button type="button" class="btn-toggle-pass" id="toggleConfirm" aria-label="Toggle confirm password visibility">
                                    <i class="bi bi-eye" id="toggleConfirmIcon"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback text-danger mt-1 fs-6" id="confirmError"></div>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-glow w-100 py-3 mb-3" id="submitBtn">
                            <span id="btnText"><i class="bi bi-person-plus-fill me-2"></i>Register Account</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>

                    <p class="text-center text-secondary mb-0">
                        Already have an account? <a href="login.html" class="text-info text-decoration-none">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="statusToast" class="toast glass-toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="toast-header">
                <i class="bi bi-info-circle-fill me-2" id="toastIcon"></i>
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <small class="text-secondary">Just now</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/register.js"></script>
</body>
</html>
