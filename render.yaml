services:
  # Web service running Apache/PHP from Dockerfile
  - type: web
    name: secure-auth-web
    env: docker
    plan: free
    numReplicas: 1
    envVars:
      - key: PORT
        value: 80
      - key: MYSQL_HOST
        fromService:
          name: secure-auth-mysql
          type: pserv
          property: host
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_DATABASE
        value: auth_system
      - key: MYSQL_USER
        value: auth_user
      - key: MYSQL_PASSWORD
        value: auth_password
      - key: MONGO_URI
        value: mongodb://mongo_user:mongo_password@secure-auth-mongo:27017/auth_system?authSource=admin
      - key: REDIS_HOST
        fromService:
          name: secure-auth-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: secure-auth-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: secure-auth-redis
          type: redis
          property: password
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SESSION_SECRET
        generateValue: true

  # Private MySQL Service
  - type: pserv
    name: secure-auth-mysql
    env: docker
    dockerfile: Dockerfile.mysql
    plan: free
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root_password
      - key: MYSQL_DATABASE
        value: auth_system
      - key: MYSQL_USER
        value: auth_user
      - key: MYSQL_PASSWORD
        value: auth_password

  # Private MongoDB Service
  - type: pserv
    name: secure-auth-mongo
    env: docker
    dockerfile: Dockerfile.mongo
    plan: free
    disk:
      name: mongo-data
      mountPath: /data/db
      sizeGB: 1
    envVars:
      - key: MONGO_INITDB_ROOT_USERNAME
        value: mongo_user
      - key: MONGO_INITDB_ROOT_PASSWORD
        value: mongo_password
      - key: MONGO_INITDB_DATABASE
        value: auth_system

  # Redis Service
  - type: redis
    name: secure-auth-redis
    plan: free
    ipAllowList: [] # Private access only
